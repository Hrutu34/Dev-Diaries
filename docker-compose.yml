version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: devdiaries-mongodb
    environment:
      MONGO_INITDB_DATABASE: devdiaries
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - devdiaries-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devdiaries-backend
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/devdiaries
      APP_JWT_SECRET: devdiariesSecretKeyForDocker
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - devdiaries-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb-data:

networks:
  devdiaries-network:
    driver: bridge
